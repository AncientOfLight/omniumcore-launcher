name: Build OmniumCore Windows
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          modules: 'qtmultimedia qtconcurrent'
      - name: Build
        run: |
          $dir = Get-ChildItem -Filter CMakeLists.txt -Recurse | Select-Object -First 1 -ExpandProperty DirectoryName
          cd "$dir"
          cmake -B build -S . -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config Release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OmniumCore-Launcher
          path: "**/build/Release/*.exe"
