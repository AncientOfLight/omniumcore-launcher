name: Build OmniumCore Windows
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.*'
          
      - name: List Files and Build
        run: |
          # 1. Ver qué carpetas hay (para diagnóstico)
          dir
          
          # 2. Entrar a la subcarpeta que Replit suele crear
          # Cambiamos al directorio del proyecto y compilamos
          cmake -B build -S . -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          cmake --build build --config Release
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OmniumCore-Launcher
          path: |
            build/Release/*.exe
            **/Release/*.exe
